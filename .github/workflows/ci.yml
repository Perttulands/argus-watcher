name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Go packages
        run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install shell test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq

      - name: Run Go tests
        run: go test ./...

      - name: Run shell tests
        run: |
          set -euo pipefail
          for test_file in tests/*_test.sh; do
            bash "$test_file"
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install lint dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run go vet
        run: go vet ./...

      - name: Run shellcheck
        run: |
          shellcheck \
            actions.sh \
            argus.sh \
            collectors.sh \
            notify-telegram.sh \
            scripts/*.sh \
            tests/*_test.sh
